version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vehicle_insurance_backend
    ports:
      - "5000:5000"
    env_file:
      - /home/ubuntu/.env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - MONGODB_URL=${MONGODB_URL}
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vehicle_insurance_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: always